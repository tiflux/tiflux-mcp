AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TiFlux MCP Server - AWS Lambda deployment with Function URL (v1.4.9)

Parameters:
  DatadogApiKey:
    Type: String
    Description: Datadog API Key para APM (obter em Datadog > Organization Settings > API Keys)
    NoEcho: true
    Default: ''

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs18.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: production
        DD_ENV: production
        DD_SERVICE: tiflux-mcp
        DD_VERSION: '1.0.0'
        DD_API_KEY: !Ref DatadogApiKey
        OAUTH_TABLE_NAME: !Ref OAuthTable
        OAUTH_ISSUER: 'https://mcp.tiflux.com'

Resources:
  # Tabela DynamoDB para estado OAuth (clients, codes, tokens)
  OAuthTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tiflux-mcp-oauth
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: TiFlux
        - Key: Component
          Value: MCP-OAuth

  TiFluxMCPFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tiflux-mcp-server
      Description: TiFlux MCP Server for Claude Code and AI clients
      Handler: lambda.handler
      CodeUri: .
      # Datadog Extension Layer para APM
      Layers:
        - arn:aws:lambda:sa-east-1:464622532012:layer:Datadog-Extension:65
      # Limitar execuções simultâneas para controlar custos e prevenir abuso
      ReservedConcurrentExecutions: 10
      Policies:
        - CloudWatchLogsFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref OAuthTable
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - '*'
          AllowMethods:
            - GET
            - POST
          AllowHeaders:
            - content-type
            - x-tiflux-api-key
            - mcp-session-id
            - authorization
          MaxAge: 86400
      Tags:
        Project: TiFlux
        Component: MCP-Server
        Environment: Production

Outputs:
  TiFluxMCPFunctionUrl:
    Description: URL do endpoint Lambda Function URL
    Value: !GetAtt TiFluxMCPFunctionUrl.FunctionUrl
    Export:
      Name: TiFluxMCPEndpoint

  TiFluxMCPFunctionArn:
    Description: ARN da funcao Lambda
    Value: !GetAtt TiFluxMCPFunction.Arn
    Export:
      Name: TiFluxMCPFunctionArn

  TiFluxMCPFunctionName:
    Description: Nome da funcao Lambda
    Value: !Ref TiFluxMCPFunction

  OAuthTableName:
    Description: Nome da tabela DynamoDB OAuth
    Value: !Ref OAuthTable
